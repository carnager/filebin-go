{{template "header" .}}

<div class="narrow" style="padding-top:3rem">
  <h2>Password Required</h2>
  {{if eq .FlashType "error"}}
    <div class="alert error">{{.Flash}}</div>
  {{end}}
  <form method="post">
    <label for="password">Password</label>
    <input type="password" name="password" id="password" class="input" autofocus required placeholder="Enter password">
    <button type="submit" class="btn primary" style="width:100%;margin-top:.5rem">Unlock</button>
  </form>
</div>

{{template "footer" .}}
